# Ruff Configuration for PODFCSSV
# https://docs.astral.sh/ruff/
#
# This project follows research-grade Python conventions:
# - Standard PEP 8 rules are enforced for general readability.
# - Mathematical variable names (K, N, D, X, Z) are exempt from
#   lowercase naming rules, as they follow standard ML/math notation.

target-version = "py39"
line-length = 100

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes (undefined names, unused imports)
    "I",    # isort (import ordering)
    "N",    # pep8-naming conventions
    "UP",   # pyupgrade (modernize syntax for target Python version)
    "B",    # flake8-bugbear (common bug patterns)
    "SIM",  # flake8-simplify (unnecessary complexity)
    "RUF",  # Ruff-specific rules (ambiguous characters, etc.)
]
ignore = [
    "E501",  # line too long — handled by the formatter, not the linter
    "N803",  # argument name should be lowercase — we use X, K, D, N per math convention
    "N806",  # variable in function should be lowercase — matrix/tensor math conventions
    "B023",  # function uses loop variable — common in ThreadPoolExecutor patterns
]

[lint.isort]
known-first-party = ["src"]

[lint.per-file-ignores]
# Test files may use assert statements and longer lines
"tests/**" = ["B011", "E501"]

[format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true
